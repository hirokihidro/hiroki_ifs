name: esp32_mqtt_app
description: Flutter app to control an ESP32 over MQTT (protocol 3.1.1, sin TLS)
publish_to: "none"
version: 0.1.0
environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.2
  mqtt_client: ^10.0.0
  shared_preferences: ^2.2.2
  http: ^1.1.0
  permission_handler: ^12.0.1
  flutter_phoenix: ^1.1.1
  google_fonts: ^8.0.2
  lucide_flutter: ^0.575.0 # CAMBIADO de '0.563.0' a '^0.563.0'
  crypto: ^3.0.3
  url_launcher: ^6.2.2
  # Bluetooth settings are opened via a small platform MethodChannel implemented in
  # `android/app/src/main/kotlin/.../MainActivity.kt`. We avoid depending on `app_settings` or
  # `android_intent_plus` to prevent AGP `namespace` issues during release builds.
  characters: ^1.4.1
  material_color_utilities: ^0.13.0
  flutter_inappwebview: ^6.0.0
  flutter_blue_plus: ^2.1.1
  wifi_iot: ^0.3.19
  network_info_plus: ^7.0.0
  multicast_dns: ^0.3.2+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  matcher: ^0.12.18
  test_api: ^0.7.9
  test: ^1.26.3
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo_ico.png"  # Ruta local del logo descargado
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/logo_ico.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/



